<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Contas</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/conta.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="menu"></div>

    <main>
      <div class="container">
        <h2>
          <i class="fa-solid fa-coins"></i>
          Gerenciar dinheiro
        </h2>

        <form id="formConta" class="card">
          <h3><i class="fa-solid fa-plus"></i> Nova conta</h3>

          <div class="form-grid">
            <div class="form-group">
              <label>Nome da conta</label>
              <input id="nome" required />
            </div>

            <div class="form-group">
              <label>Tipo</label>
              <select id="tipo" required>
                <option value="" selected disabled>Selecione o tipo</option>
                <option value="corrente">Corrente</option>
                <option value="credito">Crédito</option>
                <option value="investimento">Investimento</option>
              </select>
            </div>

            <div class="form-group">
              <label>Saldo inicial</label>
              <input id="saldoInicial" type="number" step="0.01" />
            </div>
          </div>

          <button class="btn-salvar" type="submit">
            <i class="fa-solid fa-plus"></i> Adicionar conta
          </button>
        </form>

        <hr />

        <h3>
          <i class="fa-solid fa-wallet"></i>
          Carteira
        </h3>

        <div class="carteira-card">
          <div class="carteira-header">
            <div class="carteira-saldo" id="carteiraSaldo">R$ 0,00</div>
          </div>
          <div class="carteira-acoes">
            <button class="btn-adicionar" onclick="adicionarDinheiro()">
              <i class="fa-solid fa-plus"></i> Adicionar
            </button>
            <button class="btn-deletar" onclick="removerDinheiro()">
              <i class="fa-solid fa-minus"></i> Remover
            </button>
            <button class="btn-transferir" onclick="abrirTransferencia()">
              <i class="fa-solid fa-exchange"></i> Transferir
            </button>
          </div>
        </div>

        <hr />

        <h3>
          <i class="fa-solid fa-building-columns"></i>
          Contas
        </h3>

        <div id="contas" class="contas-grid"></div>
      </div>
    </main>

    <script type="module" src="../js/carteira.js"></script>
    <script type="module" src="../js/conta.js"></script>
    <script type="module" src="../js/init.js"></script>
  </body>
</html>
