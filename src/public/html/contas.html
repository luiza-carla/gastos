<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main>
    <div class="container">
      <h2>Gerenciar Contas</h2>
      <form id="formConta">
        <input placeholder="Nome da conta" id="nome" required/>
        <select id="tipo">
          <option value="corrente">Corrente</option>
          <option value="credito">Crédito</option>
          <option value="dinheiro">Dinheiro</option>
          <option value="investimento">Investimento</option>
        </select>
        <input placeholder="Saldo Inicial" id="saldoInicial" type="number"/>
        <button type="submit">Criar Conta</button>
      </form>
      <div id="contas"></div>
    </div>
  </main>

  <script type="module" src="../js/conta.js"></script>
  <script type="module" src="../js/init.js"></script>
  <script type="module" src="../js/inicio.js"></script>
</body>
</html>
