<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Salários</title>

  <link rel="stylesheet" href="../css/salario.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div id="menu"></div>

<main>

  <div class="container">

    <h2><i class="fa-solid fa-hand-holding-dollar"></i> Salários</h2>

    <div class="card">

      <h3><i class="fa-solid fa-plus"></i> Adicionar salário</h3>

      <form id="formSalario">

        <div class="form-group">
          <label>Valor</label>
          <input type="number" id="valor" placeholder="Ex: 2500" step="0.01" required>
        </div>

        <div class="form-group">
          <label>Conta de depósito</label>
          <select id="contaSalario">
            <option value="">-- Selecione a conta --</option>
          </select>
        </div>

        <button type="submit">
          <i class="fa-solid fa-floppy-disk"></i> Salvar salário
        </button>

      </form>

    </div>

    <div class="card">

      <h3><i class="fa-solid fa-list"></i> Salários cadastrados</h3>

      <div id="salariosContainer" class="lista-registros"></div>

    </div>

  </div>

</main>

<script type="module" src="../js/init.js"></script>

</body>
</html>
