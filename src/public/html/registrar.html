<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Registro</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <h2>Registrar Usuário</h2>
    <form id="formRegistrar">
      <input placeholder="Nome" id="nome" required />
      <input placeholder="Email" id="email" type="email" required />
      <input placeholder="Senha" id="senha" type="password" required />
      <button type="submit">Registrar</button>
    </form>
    <p>Já tem conta? <a href="login.html">Login</a></p>
  </div>

  <script type="module" src="../js/registrar.js"></script>
  <script type="module" src="../js/init.js"></script>
</body>
</html>
