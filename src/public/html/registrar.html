<!DOCTYPE html>
<html>
<head>
  <title>Registro</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <h2>Registrar Usuário</h2>
    <form id="formRegistrar">
      <input placeholder="Nome" id="nome" required/>
      <input placeholder="Email" id="email" type="email" required/>
      <input placeholder="Senha" id="senha" type="password" required/>
      <input placeholder="Salário" id="salario" type="number" required/>
      <button type="submit">Registrar</button>
    </form>
    <p>Já tem conta? <a href="login.html">Login</a></p>
  </div>

  <script src="../config/config.js"></script>
  <script src="../js/registrar.js"></script>
</body>
</html>
