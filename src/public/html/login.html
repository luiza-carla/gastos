<!DOCTYPE html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
  </head>
  
  <body>
    <div class="container">
      <h2>Login</h2>
      
      <form id="formLogin">
        <input placeholder="Email" id="loginEmail" type="email" required/>
        <input placeholder="Senha" id="loginSenha" type="password" required/>
        <button type="submit">Login</button>
      </form>
      
      <p>Não tem conta? <a href="../html/registrar.html">Registrar</a></p>
    </div>

    <script type="module" src="../js/login.js"></script>
    <script type="module" src="../js/init.js"></script>
  </body>
</html>
