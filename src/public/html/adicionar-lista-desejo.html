<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Adicionar à Lista de Desejos</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/transacoes.css" />
    <link rel="stylesheet" href="../css/listaDesejos.css" />

    <link
      rel="stylesheet"
      href="/vendor/fontawesome/css/all.min.css"
    />
  </head>

  <body>
    <div id="menu"></div>

    <main>
      <div class="container">
        <h2><i class="fa-solid fa-star"></i> Adicionar novo desejo</h2>

        <form id="formListaDesejo">
          <div class="card card-formulario">
            <h3><i class="fa-solid fa-info-circle"></i> Informações</h3>

            <div class="form-grid">
              <div class="form-group">
                <label>Título</label>
                <input id="titulo" required />
              </div>

              <div class="form-group">
                <label>Valor estimado</label>
                <input id="valor" type="number" step="0.01" required />
              </div>
            </div>
          </div>

          <div class="card card-formulario">
            <h3><i class="fa-solid fa-tags"></i> Classificação</h3>

            <div class="form-grid">
              <div class="form-group">
                <label>Categoria</label>
                <div class="categoria-autocomplete">
                  <input
                    type="text"
                    id="buscaCategoria"
                    placeholder="Buscar ou selecionar categoria..."
                    autocomplete="off"
                    required
                  />
                  <input type="hidden" id="categoria" required />
                  <div
                    id="dropdownCategorias"
                    class="dropdown-categorias"
                  ></div>
                </div>
              </div>

              <div class="form-group">
                <label>Tipo de despesa</label>
                <select id="tipoDespesa">
                  <option value="">Selecione o tipo de despesa</option>
                  <option value="essencial">Essencial</option>
                  <option value="eventual">Eventual</option>
                  <option value="opcional">Opcional</option>
                </select>
              </div>
            </div>

            <div id="tagsArea">
              <label>Tags</label>

              <div id="tagsContainer"></div>

              <div class="tag-input-area">
                <input id="tagInput" placeholder="Digite uma tag" />
                <button type="button" id="btnAddTag">
                  <i class="fa-solid fa-check"></i>
                </button>
                <button type="button" id="btnNovaTag">
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
            </div>

            <div style="margin-top: 16px"></div>

            <div style="display: flex; gap: 12px">
              <button
                class="btn-salvar"
                type="submit"
                data-action="salvar-redirect"
              >
                <i class="fa-solid fa-plus"></i> Adicionar a lista de desejos
              </button>
              <button
                class="btn-salvar"
                type="submit"
                data-action="salvar-adicionar-outro"
              >
                <i class="fa-solid fa-repeat"></i> Salvar e adicionar outro
              </button>
            </div>
          </div>
        </form>
      </div>
    </main>

    <script type="module" src="../js/listaDesejo.js"></script>
    <script type="module" src="../js/init.js"></script>
  </body>
</html>
