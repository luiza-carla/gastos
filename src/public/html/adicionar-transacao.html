<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Adicionar Transação</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/transacoes.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="menu"></div>

    <main>
      <div class="container">
        <h2>
          <i class="fa-solid fa-money-bill-transfer"></i> Adicionar nova
          transação
        </h2>

        <form id="formTransacao">
          <div class="card card-formulario">
            <h3><i class="fa-solid fa-info-circle"></i> Informações básicas</h3>

            <div class="form-grid">
              <div class="form-group">
                <label>Título</label>
                <input id="titulo" required />
              </div>

              <div class="form-group">
                <label>Valor</label>
                <input id="valor" type="number" step="0.01" required />
              </div>

              <div class="form-group">
                <label>Tipo</label>
                <select id="tipo" required>
                  <option value="" selected disabled>Selecione o tipo</option>
                  <option value="entrada">Entrada</option>
                  <option value="saida">Saída</option>
                </select>
              </div>
            </div>

            <div
              id="tipoDespesaContainer"
              class="form-group"
              style="display: none"
            >
              <label for="tipoDespesa">Tipo de saída</label>
              <select id="tipoDespesa">
                <option value="">Selecione o tipo de saída</option>
                <option value="essencial">Essencial</option>
                <option value="eventual">Eventual</option>
                <option value="opcional">Opcional</option>
              </select>
            </div>
          </div>

          <div class="card card-formulario">
            <h3><i class="fa-solid fa-tags"></i> Classificação</h3>

            <div class="form-grid">
              <div class="form-group">
                <label>Conta</label>
                <select id="conta" required>
                  <option value="" selected disabled>Selecione a conta</option>
                </select>
              </div>

              <div class="form-group">
                <label>Categoria</label>
                <div class="categoria-autocomplete">
                  <input
                    type="text"
                    id="buscaCategoria"
                    placeholder="Buscar ou selecionar categoria..."
                    autocomplete="off"
                    required
                  />
                  <input type="hidden" id="categoria" required />
                  <div
                    id="dropdownCategorias"
                    class="dropdown-categorias"
                  ></div>
                </div>
              </div>
            </div>

            <div id="tagsArea">
              <label>Tags</label>

              <div id="tagsContainer"></div>

              <div class="tag-input-area">
                <input id="tagInput" placeholder="Digite uma tag" />
                <button type="button" id="btnAddTag">
                  <i class="fa-solid fa-check"></i>
                </button>
                <button type="button" id="btnNovaTag">
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="card card-formulario">
            <h3><i class="fa-solid fa-clock"></i> Recorrência</h3>

            <div class="form-grid">
              <div class="form-group">
                <label>Status</label>
                <select id="status" required>
                  <option value="completa" selected>Completa</option>
                  <option value="pendente">Pendente</option>
                </select>
              </div>

              <div class="form-group">
                <label>Recorrência</label>
                <select id="recorrencia">
                  <option value="nenhuma" selected>Nenhuma</option>
                  <option value="diaria">Diária</option>
                  <option value="semanal">Semanal</option>
                  <option value="mensal">Mensal</option>
                  <option value="anual">Anual</option>
                </select>
              </div>
            </div>

            <div id="parcelasContainer" style="display: none">
              <div class="form-grid">
                <div class="form-group">
                  <label>Total de parcelas</label>
                  <input id="totalParcelas" type="number" min="1" value="1" />
                </div>

                <div class="form-group">
                  <label>Parcela atual</label>
                  <input id="parcelaAtual" type="number" min="1" value="1" />
                </div>
              </div>
            </div>
          </div>

          <div style="display: flex; gap: 12px">
            <button
              class="btn-salvar"
              type="submit"
              data-action="salvar-redirect"
            >
              <i class="fa-solid fa-plus"></i> Adicionar transação
            </button>
            <button
              class="btn-salvar"
              type="submit"
              data-action="salvar-adicionar-outro"
            >
              <i class="fa-solid fa-repeat"></i> Salvar e adicionar outro
            </button>
          </div>
        </form>
      </div>
    </main>

    <script type="module" src="../js/transacao.js"></script>
    <script type="module" src="../js/init.js"></script>
  </body>
</html>
