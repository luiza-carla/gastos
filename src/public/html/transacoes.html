<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Transações</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/transacoes.css" />

    <link
      rel="stylesheet"
      href="/vendor/fontawesome/css/all.min.css"
    />
  </head>

  <body>
    <div id="menu"></div>

    <main>
      <div class="container">
        <h2>
          <i class="fa-solid fa-money-bill-transfer"></i> Gerenciar transações
        </h2>

        <div class="card card-atalho-adicionar">
          <button
            class="btn-salvar"
            onclick="window.location.href = '/html/adicionar-transacao.html'"
          >
            <i class="fa-solid fa-plus"></i> Adicionar nova transação
          </button>
        </div>

        <hr />

        <h3><i class="fa-solid fa-list"></i> Transações</h3>

        <div id="resumoTransacoes" class="resumo-listagem">
          <span>Total estimado:</span>
          <strong id="totalTransacoes" class="resumo-listagem-valor"
            >R$ 0.00</strong
          >
        </div>

        <div id="transacoes"></div>

        <div id="paginationTransacoes" class="pagination-listagem" style="display: none">
          <button id="btnAnteriorTransacoes" type="button" disabled>
            Anterior
          </button>
          <span id="pageInfoTransacoes">Página 1</span>
          <button id="btnProximoTransacoes" type="button">Próximo</button>
        </div>
      </div>
    </main>

    <script type="module" src="../js/init.js"></script>
  </body>
</html>
