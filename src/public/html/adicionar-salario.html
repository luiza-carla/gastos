<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Adicionar Salário</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/salario.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="menu"></div>

    <main>
      <div class="container">
        <h2>
          <i class="fa-solid fa-hand-holding-dollar"></i> Adicionar novo salário
        </h2>

        <form id="formSalario" class="card card-formulario">
          <div class="form-group">
            <label>Valor</label>
            <input type="number" id="valor" step="0.01" required />
          </div>

          <div class="form-group">
            <label>Dia do recebimento</label>
            <select id="diaRecebimento" required>
              <option value="" selected disabled>Selecione o dia</option>
            </select>
          </div>

          <div class="form-group">
            <label>Destino do depósito</label>
            <select id="contaSalario">
              <option value="">Selecione a conta ou carteira</option>
            </select>
          </div>

          <div style="display: flex; gap: 12px">
            <button
              class="btn-salvar"
              type="submit"
              data-action="salvar-redirect"
            >
              <i class="fa-solid fa-floppy-disk"></i> Salvar salário
            </button>
            <button
              class="btn-salvar"
              type="submit"
              data-action="salvar-adicionar-outro"
            >
              <i class="fa-solid fa-repeat"></i> Salvar e adicionar outro
            </button>
          </div>
        </form>
      </div>
    </main>

    <script type="module" src="../js/salario.js"></script>
    <script type="module" src="../js/init.js"></script>
  </body>
</html>
