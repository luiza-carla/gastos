<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Lista de Desejos</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/transacoes.css" />
    <link rel="stylesheet" href="../css/listaDesejos.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="menu"></div>

    <main>
      <div class="container">
        <h2><i class="fa-solid fa-star"></i> Lista de desejos</h2>

        <form id="formListaDesejo">
          <div class="card">
            <h3><i class="fa-solid fa-plus"></i> Novo desejo</h3>

            <div class="form-grid">
              <div class="form-group">
                <label>Título</label>
                <input id="titulo" required />
              </div>

              <div class="form-group">
                <label>Valor estimado</label>
                <input id="valor" type="number" step="0.01" required />
              </div>
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label>Categoria</label>
                <div class="categoria-autocomplete">
                  <input
                    type="text"
                    id="buscaCategoria"
                    placeholder="Buscar ou selecionar categoria..."
                    autocomplete="off"
                    required
                  />
                  <input type="hidden" id="categoria" required />
                  <div
                    id="dropdownCategorias"
                    class="dropdown-categorias"
                  ></div>
                </div>
              </div>

              <div class="form-group">
                <label>Tipo de despesa</label>
                <select id="tipoDespesa">
                  <option value="">Selecione o tipo de despesa</option>
                  <option value="essencial">Essencial</option>
                  <option value="eventual">Eventual</option>
                  <option value="opcional">Opcional</option>
                </select>
              </div>
            </div>

            <div id="tagsArea">
              <label>Tags</label>

              <div id="tagsContainer"></div>

              <div class="tag-input-area">
                <input id="tagInput" placeholder="Digite uma tag" />
                <button type="button" id="btnAddTag">
                  <i class="fa-solid fa-check"></i>
                </button>
                <button type="button" id="btnNovaTag">
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
            </div>

            <div style="margin-top: 16px"></div>

            <button class="btn-salvar" type="submit">
              <i class="fa-solid fa-plus"></i> Adicionar a lista de desejos
            </button>
          </div>
        </form>

        <hr />

        <h3><i class="fa-solid fa-list"></i> Desejos</h3>

        <div id="resumoDesejos" class="resumo-listagem">
          <span>Total estimado:</span>
          <strong id="totalDesejos" class="resumo-listagem-valor"
            >R$ 0.00</strong
          >
        </div>

        <div id="listaDesejos"></div>
      </div>
    </main>

    <script type="module" src="../js/init.js"></script>
  </body>
</html>
