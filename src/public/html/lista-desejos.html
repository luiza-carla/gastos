<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Lista de Desejos</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/transacoes.css" />
    <link rel="stylesheet" href="../css/listaDesejos.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="menu"></div>

    <main>
      <div class="container">
        <h2><i class="fa-solid fa-star"></i> Lista de desejos</h2>

        <div class="card card-atalho-adicionar">
          <button
            class="btn-salvar"
            onclick="window.location.href = '/html/adicionar-lista-desejo.html'"
          >
            <i class="fa-solid fa-plus"></i> Adicionar novo desejo
          </button>
        </div>

        <hr />

        <h3><i class="fa-solid fa-list"></i> Desejos</h3>

        <div id="resumoDesejos" class="resumo-listagem">
          <span>Total estimado:</span>
          <strong id="totalDesejos" class="resumo-listagem-valor"
            >R$ 0.00</strong
          >
        </div>

        <div id="listaDesejos"></div>

        <div id="paginationDesejos" class="pagination-listagem" style="display: none">
          <button id="btnAnteriorDesejos" type="button" disabled>
            Anterior
          </button>
          <span id="pageInfoDesejos">Página 1</span>
          <button id="btnProximoDesejos" type="button">Próximo</button>
        </div>
      </div>
    </main>

    <script type="module" src="../js/init.js"></script>
  </body>
</html>
