<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Lista de Desejos</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/transacoes.css">
    <link rel="stylesheet" href="../css/listaDesejos.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>

  <body>
    <div id="menu"></div>

    <main>
      <div class="container">
        <h2><i class="fa-solid fa-star"></i> Lista de desejos</h2>

        <form id="formListaDesejo">
          <div class="card">
            <h3><i class="fa-solid fa-plus"></i> Novo item desejado</h3>

            <div class="form-grid">
              <div class="form-group">
                <label>Titulo</label>
                <input placeholder="Ex: Viagem para praia" id="titulo" required>
              </div>

              <div class="form-group">
                <label>Valor estimado</label>
                <input placeholder="Ex: 1200" id="valor" type="number" step="0.01" required>
              </div>
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label>Categoria</label>
                <div class="categoria-autocomplete">
                  <input type="text" id="buscaCategoria" placeholder="Buscar ou selecionar categoria..." autocomplete="off" required>
                  <input type="hidden" id="categoria" required>
                  <div id="dropdownCategorias" class="dropdown-categorias"></div>
                </div>
              </div>

              <div class="form-group">
                <label>Tipo de despesa</label>
                <select id="tipoDespesa">
                  <option value="">-- Opcional --</option>
                  <option value="essencial">Essencial</option>
                  <option value="eventual">Eventual</option>
                  <option value="opcional">Opcional</option>
                </select>
              </div>
            </div>

            <div id="tagsArea">
              <label>Tags</label>

              <div id="tagsContainer"></div>

              <div class="tag-input-area">
                <input id="tagInput" placeholder="Digite uma tag">
                <button type="button" id="btnAddTag">
                  <i class="fa-solid fa-check"></i>
                </button>
                <button type="button" id="btnNovaTag">
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
            </div>

            <div style="margin-top: 16px;"></div>

            <button class="btn-salvar" type="submit">
              <i class="fa-solid fa-plus"></i> Adicionar a lista de desejos
            </button>
          </div>
        </form>

        <hr>

        <h2><i class="fa-solid fa-list"></i> Itens planejados</h2>

        <div id="listaDesejos"></div>
      </div>
    </main>

    <script type="module" src="../js/init.js"></script>
  </body>
</html>
